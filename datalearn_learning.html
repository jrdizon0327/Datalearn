<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DataLearn — Student Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Literata:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0b1724;
    --navy-mid: #132033;
    --navy-light: #1c2f47;
    --teal: #00c9a7;
    --teal-dim: #00a589;
    --amber: #f5a623;
    --rose: #f05c6e;
    --sky: #4db8ff;
    --text: #e8edf3;
    --muted: #7a93ad;
    --border: rgba(255,255,255,0.07);
    --card: rgba(19,32,51,0.9);
    --glass: rgba(255,255,255,0.04);
    --sidebar-w: 280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Literata', Georgia, serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,201,167,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,167,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(11,23,36,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px;
    z-index: 200;
    gap: 16px;
  }

  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.1rem;
    color: var(--teal); letter-spacing: -0.03em;
    margin-right: 8px;
  }

  .topbar-course {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 12px;
  }

  .progress-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
  }

  .progress-pill-bar {
    width: 80px; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }

  .progress-pill-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--sky));
    transition: width 0.6s ease;
  }

  .progress-pill-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--teal);
    letter-spacing: 0.06em;
  }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }

  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 0.7rem; color: var(--navy);
  }

  .user-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.78rem; color: var(--text);
  }

  .btn-logout {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    background: none; border: none; cursor: pointer;
    letter-spacing: 0.08em; padding: 4px 8px;
    border-radius: 4px; transition: color 0.2s;
  }
  .btn-logout:hover { color: var(--rose); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    margin-top: 56px;
    min-height: calc(100vh - 56px);
    position: relative; z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    top: 56px; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--navy-mid);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 100;
  }

  .sidebar-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.8rem;
    color: var(--text); margin-bottom: 4px;
  }

  .sidebar-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Overall progress bar in sidebar */
  .sidebar-progress {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sp-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }

  .sp-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .sp-pct {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.75rem; color: var(--teal);
  }

  .sp-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }

  .sp-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--sky));
    transition: width 0.8s ease;
  }

  /* Day list */
  .day-list { padding: 8px 0; }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    padding: 10px 20px 4px;
  }

  .day-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }

  .day-item:hover:not(.locked) { background: var(--glass); }

  .day-item.active {
    background: rgba(0,201,167,0.07);
    border-left-color: var(--teal);
  }

  .day-item.locked { cursor: not-allowed; opacity: 0.45; }

  .day-icon {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; flex-shrink: 0;
    font-family: 'DM Mono', monospace; font-weight: 500;
  }

  .day-icon.done { background: var(--teal); color: var(--navy); }
  .day-icon.active-icon { background: rgba(0,201,167,0.15); color: var(--teal); border: 1px solid var(--teal); }
  .day-icon.locked-icon { background: rgba(255,255,255,0.05); color: var(--muted); }
  .day-icon.available-icon { background: rgba(77,184,255,0.12); color: var(--sky); }

  .day-info { flex: 1; min-width: 0; }

  .day-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.75rem;
    color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  .day-item.locked .day-title { color: var(--muted); }

  .day-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.56rem; color: var(--muted);
    margin-top: 1px; letter-spacing: 0.04em;
  }

  .day-check {
    font-size: 0.7rem; color: var(--teal); flex-shrink: 0;
  }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: var(--sidebar-w);
    padding: 32px 40px;
    max-width: 860px;
  }

  /* Lesson header */
  .lesson-header { margin-bottom: 28px; }

  .lesson-day-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--teal);
    background: rgba(0,201,167,0.1);
    border: 1px solid rgba(0,201,167,0.2);
    border-radius: 20px; padding: 4px 12px;
    display: inline-block; margin-bottom: 12px;
  }

  .lesson-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.6rem;
    color: var(--text); letter-spacing: -0.03em;
    line-height: 1.2; margin-bottom: 12px;
  }

  .lesson-meta-row {
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap; flex-direction: row;
    margin-top: 8px;
  }

  .lesson-meta-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--muted);
    display: inline-flex; align-items: center; gap: 5px;
    letter-spacing: 0.04em; white-space: nowrap;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
  }

  /* ── VIDEO PLAYER ── */
  .video-section { margin-bottom: 28px; }

  .video-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }

  .video-wrap {
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    padding-top: 56.25%; /* 16:9 */
  }

  .video-wrap iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border: none;
  }

  .video-placeholder {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; background: var(--navy-mid);
    cursor: pointer;
  }

  .play-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(0,201,167,0.4);
    animation: pulse-ring 2s infinite;
  }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,201,167,0.4); }
    70%  { box-shadow: 0 0 0 16px rgba(0,201,167,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,201,167,0); }
  }

  .play-btn:hover { transform: scale(1.08); }

  .video-placeholder-text {
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.85rem; color: var(--muted);
  }

  /* ── LESSON CONTENT ── */
  .content-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
  }

  .content-section h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1rem;
    color: var(--text); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .content-section h3 .section-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal); box-shadow: 0 0 6px var(--teal);
    flex-shrink: 0;
  }

  .content-body {
    font-size: 0.92rem; line-height: 1.75;
    color: rgba(232,237,243,0.85);
  }

  .content-body p { margin-bottom: 12px; }
  .content-body ul { padding-left: 20px; margin-bottom: 12px; }
  .content-body li { margin-bottom: 6px; }

  .content-body strong { color: var(--text); font-weight: 600; }

  .content-body code {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    background: rgba(0,201,167,0.1);
    color: var(--teal);
    padding: 2px 6px; border-radius: 4px;
  }

  /* ── PDF DOWNLOAD ── */
  .pdf-btn {
    display: flex; align-items: center; gap: 12px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    margin-top: 14px;
  }

  .pdf-btn:hover {
    background: rgba(0,201,167,0.08);
    border-color: rgba(0,201,167,0.3);
    transform: translateY(-1px);
  }

  .pdf-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(240,92,110,0.15);
    color: var(--rose);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }

  .pdf-info .pdf-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.82rem; color: var(--text);
  }

  .pdf-info .pdf-size {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
    margin-top: 2px; letter-spacing: 0.06em;
  }

  .pdf-download-icon { margin-left: auto; color: var(--teal); font-size: 0.9rem; }

  /* ── QUIZ SECTION ── */
  .quiz-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
  }

  .quiz-header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
  }

  .quiz-header-left {
    display: flex; align-items: center; gap: 10px;
  }

  .quiz-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(245,166,35,0.15);
    color: var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }

  .quiz-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.9rem; color: var(--text);
  }

  .quiz-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.06em; margin-top: 2px;
  }

  .quiz-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.08em;
    padding: 4px 10px; border-radius: 20px;
  }

  .quiz-badge.pending { background: rgba(245,166,35,0.15); color: var(--amber); }
  .quiz-badge.passed  { background: rgba(0,201,167,0.15);  color: var(--teal); }
  .quiz-badge.failed  { background: rgba(240,92,110,0.15); color: var(--rose); }

  /* Quiz questions */
  .quiz-body { padding: 24px 28px; }

  .quiz-q-counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.1em; margin-bottom: 20px;
    text-transform: uppercase;
  }

  .question-block { margin-bottom: 24px; }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.9rem;
    color: var(--text); margin-bottom: 12px;
    line-height: 1.4;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.85rem;
  }

  .option:hover { background: rgba(0,201,167,0.06); border-color: rgba(0,201,167,0.25); }

  .option.selected { background: rgba(0,201,167,0.1); border-color: var(--teal); color: var(--teal); }
  .option.correct  { background: rgba(0,201,167,0.15); border-color: var(--teal); color: var(--teal); }
  .option.wrong    { background: rgba(240,92,110,0.1); border-color: var(--rose); color: var(--rose); }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; font-weight: 500;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; letter-spacing: 0;
  }

  /* Quiz result */
  .quiz-result {
    text-align: center; padding: 28px;
    display: none;
  }

  .result-score {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 3rem;
    letter-spacing: -0.04em; line-height: 1;
    margin-bottom: 8px;
  }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 20px;
  }

  .result-passed { color: var(--teal); }
  .result-failed { color: var(--rose); }

  /* Action buttons */
  .quiz-actions {
    display: flex; gap: 10px;
    padding: 0 28px 24px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.78rem;
    padding: 10px 20px; border-radius: 8px;
    border: none; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.02em;
  }

  .btn-primary { background: var(--teal); color: var(--navy); }
  .btn-primary:hover { background: var(--teal-dim); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: var(--glass); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-amber { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .btn-amber:hover { background: rgba(245,166,35,0.25); }

  /* ── COMPLETE LESSON BTN ── */
  .complete-section {
    background: linear-gradient(135deg, rgba(0,201,167,0.08), rgba(77,184,255,0.06));
    border: 1px solid rgba(0,201,167,0.2);
    border-radius: 14px;
    padding: 24px 28px;
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 20px;
  }

  .complete-text .ct-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.95rem; color: var(--text);
    margin-bottom: 4px;
  }

  .complete-text .ct-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--muted); letter-spacing: 0.06em;
  }

  .btn-complete {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 0.85rem;
    padding: 12px 24px; border-radius: 10px;
    background: var(--teal); color: var(--navy);
    border: none; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,201,167,0.25);
  }

  .btn-complete:hover { background: var(--teal-dim); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,201,167,0.35); }
  .btn-complete:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── LOCKED STATE ── */
  .locked-state {
    display: none;
    flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    padding: 80px 40px; gap: 16px;
  }

  .lock-icon { font-size: 3rem; margin-bottom: 8px; }

  .lock-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1.2rem; color: var(--muted);
  }

  .lock-sub {
    font-family: 'Literata', serif;
    font-size: 0.88rem; color: var(--muted);
    max-width: 360px; line-height: 1.6;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy-light);
    border: 1px solid var(--teal);
    border-radius: 10px; padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.8rem;
    color: var(--teal); z-index: 300;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 4px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .content-section, .quiz-section, .complete-section {
    animation: fadeUp 0.4s ease both;
  }

  .content-section:nth-child(2) { animation-delay: 0.05s; }
  .content-section:nth-child(3) { animation-delay: 0.1s; }
  .quiz-section { animation-delay: 0.15s; }
  .complete-section { animation-delay: 0.2s; }

  /* Mobile */
  @media (max-width: 768px) {
    :root { --sidebar-w: 0px; }
    .sidebar { transform: translateX(-280px); width: 280px; transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">DataLearn</div>
  <div class="topbar-course">Data Analytics · NC II</div>
  <div class="topbar-right">
    <div class="progress-pill">
      <div class="progress-pill-bar">
        <div class="progress-pill-fill" id="topProgress" style="width:0%"></div>
      </div>
      <div class="progress-pill-text" id="topProgressText">0/20</div>
    </div>
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-name" id="userName">Student</div>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- LAYOUT -->

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentDay = 1;
let completedDays = JSON.parse(localStorage.getItem('dl_completed') || '[]');
let quizAnswers  = {};
let quizSubmitted = false;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  // Load user info
  const session = localStorage.getItem('dl_session');
  if (!session) { window.location.href = 'datalearn_login.html'; return; }

  try {
    const parsed = JSON.parse(session);
    const user   = parsed.user || parsed;
    const name   = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Student';
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('userName').textContent = name;
    document.getElementById('userAvatar').textContent = initials;
  } catch(e) {}

  renderDayList();
  loadDay(currentDay);
  updateProgress();
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════
function renderDayList() {
  const container = document.getElementById('dayList');
  let html = '';
  let lastWeek = 0;

  CURRICULUM.forEach(lesson => {
    if (lesson.week !== lastWeek) {
      const weekNames = ['','Week 1 — Excel Basics','Week 2 — Advanced Excel','Week 3 — SQL','Week 4 — Power BI','Week 5 — Capstone'];
      html += `<div class="week-label">${weekNames[lesson.week]}</div>`;
      lastWeek = lesson.week;
    }

    const isDone      = completedDays.includes(lesson.day);
    const isActive    = lesson.day === currentDay;
    const isLocked    = lesson.day > 1 && !completedDays.includes(lesson.day - 1) && !isActive;
    const isAvailable = !isLocked;

    let iconClass = 'locked-icon', iconContent = '🔒';
    if (isDone)        { iconClass = 'done';         iconContent = '✓'; }
    else if (isActive) { iconClass = 'active-icon';  iconContent = lesson.day; }
    else if (isAvailable) { iconClass = 'available-icon'; iconContent = lesson.day; }

    const itemClass = isLocked ? 'locked' : (isActive ? 'active' : '');

    html += `
      <div class="day-item ${itemClass}" onclick="${isLocked ? '' : `loadDay(${lesson.day})`}">
        <div class="day-icon ${iconClass}">${iconContent}</div>
        <div class="day-info">
          <div class="day-title">Day ${lesson.day}: ${lesson.title}</div>
          <div class="day-meta">${lesson.duration} · ${lesson.topic}</div>
        </div>
        ${isDone ? '<span class="day-check">✓</span>' : ''}
      </div>
    `;
  });

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// LOAD DAY
// ═══════════════════════════════════════════════════════════
function loadDay(day) {
  const lesson = CURRICULUM.find(l => l.day === day);
  if (!lesson) return;

  // Check if locked
  if (day > 1 && !completedDays.includes(day - 1)) {
    showLockedState(day);
    return;
  }

  currentDay    = day;
  quizAnswers   = {};
  quizSubmitted = false;

  const isDone = completedDays.includes(day);

  // Video
  const videoHTML = `
    <div class="video-section">
      <div class="video-label">📹 Lesson Video</div>
      <div class="video-wrap">
        <div class="video-placeholder" onclick="playVideo(${day})" id="videoPlaceholder${day}">
          <div class="play-btn">▶</div>
          <div class="video-placeholder-text">Day ${day}: ${lesson.title}</div>
        </div>
      </div>
    </div>
  `;

  // Content
  const contentHTML = `
    <div class="content-section">
      <h3><span class="section-dot"></span> Lesson Content</h3>
      <div class="content-body">${lesson.content}</div>
      <a class="pdf-btn" href="${lesson.pdf}" download>
        <div class="pdf-icon">📄</div>
        <div class="pdf-info">
          <div class="pdf-name">${lesson.pdf}</div>
          <div class="pdf-size">PDF · Lesson Handout — Day ${day}</div>
        </div>
        <span class="pdf-download-icon">⬇</span>
      </a>
    </div>
  `;

  // Quiz
  const quizHTML = buildQuiz(lesson, isDone);

  // Complete button
  const completeHTML = isDone ? `
    <div class="complete-section" style="background:linear-gradient(135deg,rgba(0,201,167,0.12),rgba(77,184,255,0.08));">
      <div class="complete-text">
        <div class="ct-title">✓ Day ${day} Completed!</div>
        <div class="ct-sub">GREAT WORK · MOVE ON TO THE NEXT LESSON</div>
      </div>
      ${day < 20 ? `<button class="btn-complete" onclick="loadDay(${day+1})">Next Lesson →</button>` : '<span style="font-family:\'Syne\',sans-serif;font-weight:700;color:var(--teal);">🎓 Course Complete!</span>'}
    </div>
  ` : `
    <div class="complete-section" id="completeSection${day}" style="display:none;">
      <div class="complete-text">
        <div class="ct-title">✓ Day ${day} Completed!</div>
        <div class="ct-sub">GREAT WORK · NEXT LESSON UNLOCKED</div>
      </div>
      ${day < 20 ? `<button class="btn-complete" onclick="loadDay(${day+1})">Next Lesson →</button>` : '<span style="font-family:\'Syne\',sans-serif;font-weight:700;color:var(--teal);">🎓 Course Complete!</span>'}
    </div>
  `;

  document.getElementById('mainContent').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-day-badge">DAY ${day} OF 20 · ${lesson.topic.toUpperCase()}</div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-meta-row">
        <div class="lesson-meta-item">⏱ ${lesson.duration}</div>
        <div class="lesson-meta-item">📋 ${lesson.quiz.length} quiz questions</div>
        <div class="lesson-meta-item">📄 Downloadable PDF</div>
        ${isDone ? '<div class="lesson-meta-item" style="color:var(--teal);">✓ Completed</div>' : ''}
      </div>
    </div>
    ${videoHTML}
    ${contentHTML}
    ${quizHTML}
    ${completeHTML}
  `;

  // Update sidebar
  document.querySelectorAll('.day-item').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === day);
  });

  renderDayList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════
function buildQuiz(lesson, alreadyDone) {
  const questionsHTML = lesson.quiz.map((q, qi) => `
    <div class="question-block" id="qblock_${qi}">
      <div class="question-text">${qi + 1}. ${q.q}</div>
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt_${qi}_${oi}" onclick="${alreadyDone ? '' : `selectOption(${qi},${oi})`}">
            <div class="option-letter">${['A','B','C','D'][oi]}</div>
            ${opt}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="quiz-section">
      <div class="quiz-header">
        <div class="quiz-header-left">
          <div class="quiz-icon">📝</div>
          <div>
            <div class="quiz-title">Lesson Quiz — Day ${lesson.day}</div>
            <div class="quiz-sub">${lesson.quiz.length} QUESTIONS · PASSING SCORE: 80%</div>
          </div>
        </div>
        <span class="quiz-badge ${alreadyDone ? 'passed' : 'pending'}" id="quizBadge">
          ${alreadyDone ? '✓ PASSED' : 'PENDING'}
        </span>
      </div>
      <div class="quiz-body" id="quizBody">
        <div class="quiz-q-counter">${lesson.quiz.length} questions — select one answer per question</div>
        ${alreadyDone ? '<div style="padding:12px 0;font-family:\'DM Mono\',monospace;font-size:0.72rem;color:var(--teal);">✓ You have already passed this quiz.</div>' : questionsHTML}
      </div>
      <div class="quiz-result" id="quizResult"></div>
      ${alreadyDone ? '' : `
        <div class="quiz-actions" id="quizActions">
          <button class="btn btn-primary" id="submitQuizBtn" onclick="submitQuiz(${lesson.day})" disabled>Submit Quiz</button>
          <button class="btn btn-ghost" onclick="resetQuiz(${lesson.day})">Reset</button>
        </div>
      `}
    </div>
  `;
}

function selectOption(qi, oi) {
  if (quizSubmitted) return;
  quizAnswers[qi] = oi;

  // Update UI — clear row, mark selected
  const lesson = CURRICULUM.find(l => l.day === currentDay);
  lesson.quiz[qi].options.forEach((_, i) => {
    const el = document.getElementById(`opt_${qi}_${i}`);
    if (el) el.className = i === oi ? 'option selected' : 'option';
  });

  // Enable submit if all answered
  const allAnswered = lesson.quiz.every((_, i) => quizAnswers[i] !== undefined);
  const btn = document.getElementById('submitQuizBtn');
  if (btn) btn.disabled = !allAnswered;
}

function submitQuiz(day) {
  const lesson = CURRICULUM.find(l => l.day === day);
  if (!lesson) return;

  quizSubmitted = true;
  let correct = 0;

  lesson.quiz.forEach((q, qi) => {
    const selected = quizAnswers[qi];
    q.options.forEach((_, oi) => {
      const el = document.getElementById(`opt_${qi}_${oi}`);
      if (!el) return;
      if (oi === q.answer)  el.className = 'option correct';
      else if (oi === selected && selected !== q.answer) el.className = 'option wrong';
    });
    if (selected === q.answer) correct++;
  });

  const total   = lesson.quiz.length;
  const score   = Math.round((correct / total) * 100);
  const passed  = score >= 80;

  const resultEl = document.getElementById('quizResult');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div class="result-score ${passed ? 'result-passed' : 'result-failed'}">${score}%</div>
    <div class="result-label ${passed ? 'result-passed' : 'result-failed'}">${passed ? '🎉 PASSED!' : '✗ Not Passed'}</div>
    <div style="font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);margin-bottom:16px;">${correct} out of ${total} correct · ${passed ? 'Minimum 80% required — well done!' : 'Minimum 80% required — review and try again.'}</div>
    ${passed ? '' : '<div style="font-size:0.82rem;color:var(--muted);">Review the lesson content above and try again.</div>'}
  `;

  // Update badge
  const badge = document.getElementById('quizBadge');
  if (badge) {
    badge.className = `quiz-badge ${passed ? 'passed' : 'failed'}`;
    badge.textContent = passed ? '✓ PASSED' : '✗ FAILED';
  }

  // Hide submit, show retry if failed
  const actions = document.getElementById('quizActions');
  if (actions) {
    actions.innerHTML = passed
      ? `<button class="btn btn-primary" onclick="markComplete(${day})">✓ Mark Lesson Complete</button>`
      : `<button class="btn btn-amber" onclick="resetQuiz(${day})">↺ Try Again</button>`;
  }

  if (passed) saveScore(day, score);
}

function resetQuiz(day) {
  quizAnswers   = {};
  quizSubmitted = false;
  loadDay(day);
  setTimeout(() => {
    document.querySelector('.quiz-section')?.scrollIntoView({ behavior: 'smooth' });
  }, 300);
}

// ═══════════════════════════════════════════════════════════
// COMPLETE LESSON
// ═══════════════════════════════════════════════════════════
function markComplete(day) {
  if (!completedDays.includes(day)) {
    completedDays.push(day);
    localStorage.setItem('dl_completed', JSON.stringify(completedDays));
    saveProgressToSupabase(day);
  }

  // Show complete section
  const sec = document.getElementById(`completeSection${day}`);
  if (sec) sec.style.display = 'flex';

  updateProgress();
  renderDayList();
  showToast(`🎉 Day ${day} complete! ${day < 20 ? 'Day ' + (day+1) + ' unlocked!' : 'Course complete! 🏆'}`);

  sec?.scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// SUPABASE SYNC
// ═══════════════════════════════════════════════════════════
async function saveProgressToSupabase(day) {
  if (IS_DEMO || !SB_URL || !SB_KEY) return;
  try {
    const token = localStorage.getItem('dl_access_token');
    const session = JSON.parse(localStorage.getItem('dl_session') || '{}');
    const userId = session.user?.id || session.id;
    if (!userId) return;

    await fetch(`${SB_URL}/rest/v1/student_progress`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${token || SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        student_id: userId,
        lesson_id: null, // set if you have lesson UUIDs
        course_id: null,
        is_completed: true,
        completion_date: new Date().toISOString(),
        time_spent_minutes: 60
      })
    });
  } catch(e) { console.warn('Supabase sync failed:', e.message); }
}

async function saveScore(day, score) {
  if (IS_DEMO || !SB_URL || !SB_KEY) return;
  try {
    const token = localStorage.getItem('dl_access_token');
    const session = JSON.parse(localStorage.getItem('dl_session') || '{}');
    const userId = session.user?.id || session.id;
    if (!userId) return;

    await fetch(`${SB_URL}/rest/v1/quiz_attempts`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${token || SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        student_id: userId,
        quiz_id: null,
        score: score,
        score_percent: score,
        passed: score >= 80,
        attempt_number: 1,
        answers: quizAnswers
      })
    });
  } catch(e) { console.warn('Score sync failed:', e.message); }
}

// ═══════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════
function updateProgress() {
  const pct = Math.round((completedDays.length / 20) * 100);
  document.getElementById('topProgress').style.width = pct + '%';
  document.getElementById('topProgressText').textContent = `${completedDays.length}/20`;
  document.getElementById('sidebarPct').textContent = pct + '%';
  document.getElementById('sidebarFill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════════
// VIDEO (placeholder — teacher adds YouTube embed IDs)
// ═══════════════════════════════════════════════════════════
function playVideo(day) {
  const lesson = CURRICULUM.find(l => l.day === day);
  if (lesson?.videoId) {
    const wrap = document.querySelector('.video-wrap');
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${lesson.videoId}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
  } else {
    showToast('📹 Video coming soon! Your trainer will add the video link.');
  }
}

// ═══════════════════════════════════════════════════════════
// LOCKED STATE
// ═══════════════════════════════════════════════════════════
function showLockedState(day) {
  document.getElementById('mainContent').innerHTML = `
    <div class="locked-state" style="display:flex;">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Day ${day} is Locked</div>
      <div class="lock-sub">Complete Day ${day - 1} first to unlock this lesson. Keep going — you're doing great!</div>
      <button class="btn btn-primary" onclick="loadDay(${day-1})" style="margin-top:8px;">← Go to Day ${day-1}</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// LOGOUT
// ═══════════════════════════════════════════════════════════
function logout() {
  localStorage.removeItem('dl_session');
  localStorage.removeItem('dl_access_token');
  window.location.href = 'datalearn_login.html';
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── BOOT ──────────────────────────────────────────────────
init();
</script>
